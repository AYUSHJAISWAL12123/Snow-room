<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Application</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #chat {
      max-height: 400px;
      overflow-y: auto;
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
    }
    #message {
      width: calc(100% - 60px);
    }
    .message {
      padding: 8px 10px;
      margin-bottom: 5px;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
    }
    .message.current-user {
      background-color: #d1ffd6;
      margin-left: auto;
      text-align: right;
    }
    .message.other-user {
      background-color: #f1f1f1;
      margin-right: auto;
      text-align: left;
    }
    #chat-interface {
      display: none;
    }
    #room-selector {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <h1>Real-Time Chat Room</h1>
  <div>
    <input id="name" type="text" placeholder="Enter your name" required>
    <button id="join">Join Chat</button>
  </div>
  <div id="chat-interface" style="display: none;">
    <input id="room-name" type="text" placeholder="Enter room name to create" required>
    <button id="create-room">Create Room</button>
    <select id="room-selector"></select>
    <button id="join-room">Join Room</button>
    <div id="chat"></div>
    <input id="message" type="text" placeholder="Type your message...">
    <button id="send">Send</button>
  </div>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
  <script>
    const socket = io();
    const chat = document.getElementById("chat");
    const nameInput = document.getElementById("name");
    const joinButton = document.getElementById("join");
    const roomNameInput = document.getElementById("room-name");
    const createRoomButton = document.getElementById("create-room");
    const roomSelector = document.getElementById("room-selector");
    const joinRoomButton = document.getElementById("join-room");
    const messageInput = document.getElementById("message");
    const sendButton = document.getElementById("send");
    const chatInterface = document.getElementById("chat-interface");
  
    let currentUser = "";
    let currentRoom = "";
  
    joinButton.addEventListener("click", () => {
      const username = nameInput.value.trim();
      if (!username) {
        alert("Please enter your name!");
        return;
      }
      currentUser = username;
      socket.emit("join_room", username, "General"); 
      nameInput.style.display = "none";
      joinButton.style.display = "none";
      chatInterface.style.display = "block";
      currentRoom = "General";
    });
  
    socket.on("message", (msg) => {
      const div = document.createElement("div");
      div.classList.add("message", "other-user");
      div.textContent = msg;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    });
  
    // Update the room list dropdown when room data is received
    socket.on("update_rooms", (rooms) => {
      roomSelector.innerHTML = ""; 
      Object.keys(rooms).forEach((room) => {
        const option = document.createElement("option");
        option.value = room;
        option.textContent = `${room} (${rooms[room]} users)`;
        roomSelector.appendChild(option);
      });
    });
  
    createRoomButton.addEventListener("click", () => {
      const roomName = roomNameInput.value.trim();
      if (roomName) {
        socket.emit("join_room", currentUser, roomName); // Create and join the new room
        currentRoom = roomName;
        roomNameInput.value = "";
        chat.innerHTML = ""; // Clear chat history
      }
    });
  
    joinRoomButton.addEventListener("click", () => {
      const roomName = roomSelector.value;
      if (roomName && currentRoom !== roomName) {
        socket.emit("join_room", currentUser, roomName); // Join the selected room
        currentRoom = roomName;
        chat.innerHTML = ""; // Clear chat history when switching rooms
      }
    });
  
    sendButton.addEventListener("click", () => {
      const msg = messageInput.value.trim();
      if (msg && currentRoom) {
        socket.emit("message", msg, currentRoom); // Send message to the current room
        const div = document.createElement("div");
        div.classList.add("message", "current-user");
        div.textContent = `You: ${msg}`;
        chat.appendChild(div);
        messageInput.value = "";
        chat.scrollTop = chat.scrollHeight;
      }
    });
  
    messageInput.addEventListener("keypress", (event) => {
      if (event.key === "Enter") {
        sendButton.click();
      }
    });
  </script>
  
</body>
</html>
